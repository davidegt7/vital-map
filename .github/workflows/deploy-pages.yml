name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - name: Install
        run: npm install
      # The data gate. places.json is the one file in this repo that can hurt
      # somebody, so a bad record fails the deploy rather than reaching a phone.
      - name: Validate place data
        run: npm run check-data
      - name: Build
        env:
          VITE_BASE_PATH: /vital-map/
          # Baked into the client at build time. Both are repo *variables*, not
          # secrets: the publishable/anon key is meant to ship in the browser,
          # and RLS is what protects the data. Empty when unset → the app falls
          # back to the static places.json, which is why this was silently fine
          # until Supabase existed.
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY }}
        run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
