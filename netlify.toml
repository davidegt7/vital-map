# Netlify only needs the build step. Headers and redirects live in public/_headers
# and public/_redirects, which Cloudflare Pages reads too — so switching hosts is a
# dashboard change, not a code change. Don't duplicate them here; two copies of the
# same rules drift, and the one that drifts is the one nobody is looking at.

[build]
  command = "npm run check-data && npm run build"
  publish = "dist"

# No VITE_BASE_PATH on purpose. GitHub Pages served from a /vital-map/ subpath;
# Netlify and Cloudflare both serve from the domain root, where vite.config.ts's
# default of "/" is correct.
